<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ 실시간 버스 위치</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f0f0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 상단 상태바 */
.topbar {
  background: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
  z-index: 1000;
  flex-shrink: 0;
}
.topbar-title { font-size: 14px; font-weight: 600; color: #111; }
.live-badge {
  display: flex; align-items: center; gap: 5px;
  background: #e8f8f0; border: 1px solid #1D9E75;
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; color: #0a6a3a; font-weight: 500;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #1D9E75;
  animation: blink 1.4s infinite;
}
.live-dot.offline { background: #ccc; animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* 지도 */
#map { flex: 1; width: 100%; }

/* 하단 정보 패널 */
.info-panel {
  background: #fff;
  border-top: 1px solid #eee;
  padding: 12px 16px;
  flex-shrink: 0;
}
.info-row {
  display: flex; justify-content: space-between;
  font-size: 12px; padding: 4px 0;
  border-bottom: 1px solid #f5f5f5;
}
.info-row:last-child { border-bottom: none; }
.il { color: #888; }
.iv { color: #111; font-weight: 500; font-family: monospace; }

/* 연결 상태 토스트 */
.toast {
  position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
  background: #534AB7; color: #fff; border-radius: 20px;
  padding: 8px 18px; font-size: 12px; font-weight: 500;
  z-index: 9999; white-space: nowrap;
  opacity: 0; transition: opacity .4s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* 버스 마커 커스텀 */
.bus-marker-wrap {
  width: 40px; height: 40px;
  position: relative;
}
.bus-pulse-ring {
  position: absolute; inset: -8px;
  border-radius: 50%; border: 2px solid #534AB7;
  opacity: .4; animation: ripple 2s infinite;
}
@keyframes ripple { 0%{transform:scale(1);opacity:.4} 100%{transform:scale(1.8);opacity:0} }
.bus-inner {
  width: 40px; height: 40px; border-radius: 50%;
  background: #534AB7; border: 3px solid #fff;
  box-shadow: 0 2px 10px rgba(83,74,183,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

/* 서버 URL 설정 (우측 하단) */
.server-setting {
  position: fixed; bottom: 160px; right: 12px; z-index: 999;
  background: #fff; border: 1px solid #ddd; border-radius: 10px;
  padding: 8px 10px; font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.server-setting input {
  border: none; outline: none; font-size: 11px;
  color: #534AB7; font-family: monospace;
  background: transparent; width: 180px;
}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="topbar-title">🚌 실시간 버스 위치</div>
  <div class="live-badge">
    <div class="live-dot offline" id="liveDot"></div>
    <span id="liveText">연결 대기</span>
  </div>
</div>

<!-- 지도 -->
<div id="map"></div>

<!-- 하단 정보 패널 -->
<div class="info-panel">
  <div class="info-row">
    <span class="il">위도 / 경도</span>
    <span class="iv" id="coordText">— / —</span>
  </div>
  <div class="info-row">
    <span class="il">마지막 수신</span>
    <span class="iv" id="lastTime">—</span>
  </div>
  <div class="info-row">
    <span class="il">수신 횟수</span>
    <span class="iv" id="recvCount">0회</span>
  </div>
  <div class="info-row">
    <span class="il">노선</span>
    <span class="iv" id="routeText">—</span>
  </div>
</div>

<!-- 서버 주소 설정 -->
<div class="server-setting">
  서버: <input id="serverUrl" type="text" value="http://localhost:3000" onchange="reconnect()">
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 지도 초기화 ──────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([37.5, 126.9], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// ── 버스 마커 ────────────────────────────────────
const busIcon = L.divIcon({
  className: '',
  html: `<div class="bus-marker-wrap">
    <div class="bus-pulse-ring"></div>
    <div class="bus-inner">🚌</div>
  </div>`,
  iconSize: [40, 40],
  iconAnchor: [20, 20],
  popupAnchor: [0, -24]
});

let busMarker = null;
let pathLine  = null;
let pathCoords = [];
let recvCount  = 0;
let eventSource = null;

// ── SSE 연결 ─────────────────────────────────────
function connect() {
  const url = document.getElementById('serverUrl').value.trim();
  if (eventSource) { eventSource.close(); }

  eventSource = new EventSource(`${url}/stream`);

  eventSource.onopen = () => {
    setLive(true);
    showToast('서버 연결됨');
  };

  eventSource.onmessage = e => {
    const data = JSON.parse(e.data);
    updateBus(data);
  };

  eventSource.onerror = () => {
    setLive(false);
    // 3초 후 재연결 시도
    setTimeout(connect, 3000);
  };
}

// ── 마커 부드럽게 이동 (애니메이션) ────────────
function animateMarker(marker, fromLatLng, toLatLng, duration) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut
    const lat = fromLatLng[0] + (toLatLng[0] - fromLatLng[0]) * ease;
    const lng = fromLatLng[1] + (toLatLng[1] - fromLatLng[1]) * ease;
    marker.setLatLng([lat, lng]);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── 버스 위치 업데이트 ───────────────────────────
function updateBus(data) {
  const { lat, lng, route, timestamp } = data;
  const latlng = [lat, lng];

  // 마커 없으면 생성, 있으면 이동
  if (!busMarker) {
    busMarker = L.marker(latlng, { icon: busIcon })
      .addTo(map)
      .bindPopup(`<b>${route || '셔틀버스'}</b><br>${lat.toFixed(5)}, ${lng.toFixed(5)}`);
    map.setView(latlng, 16);
  } else {
    const from = busMarker.getLatLng();
    animateMarker(busMarker, [from.lat, from.lng], latlng, 800); // 0.8초 애니메이션
    busMarker.getPopup()?.setContent(
      `<b>${route || '셔틀버스'}</b><br>${lat.toFixed(5)}, ${lng.toFixed(5)}`
    );
  }

  // 경로 선 그리기
  pathCoords.push(latlng);
  if (pathLine) { map.removeLayer(pathLine); }
  pathLine = L.polyline(pathCoords, {
    color: '#534AB7', weight: 3, opacity: .6, dashArray: '6 4'
  }).addTo(map);

  // 지도 중심 이동 (마커가 화면 밖으로 나가면)
  if (!map.getBounds().contains(latlng)) {
    map.panTo(latlng);
  }

  // 정보 업데이트
  recvCount++;
  document.getElementById('coordText').textContent  = `${lat.toFixed(6)} / ${lng.toFixed(6)}`;
  document.getElementById('lastTime').textContent   = new Date(timestamp || Date.now()).toLocaleTimeString();
  document.getElementById('recvCount').textContent  = `${recvCount}회`;
  document.getElementById('routeText').textContent  = route || '—';
}

function setLive(online) {
  document.getElementById('liveDot').className  = 'live-dot' + (online ? '' : ' offline');
  document.getElementById('liveText').textContent = online ? '실시간' : '연결 끊김';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function reconnect() {
  showToast('서버 주소 변경 — 재연결 중...');
  connect();
}

// 페이지 로드 시 연결 시작
connect();
</script>
</body>
</html>
